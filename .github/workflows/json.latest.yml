name: json.latest

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'app to set'
        type: string
        required: true

      version:
        description: 'version to set'
        type: string
        required: true

env:
  JSON_FILE: ./semver/latest.json

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: write

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: 'master'

      - name: update json.latest.yml
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const { readFileSync, writeFileSync } = require('node:fs');
            const { resolve } = require("node:path");
            (async()=>{
              try{
                const app = '${{ github.event.inputs.app }}'.toLowerCase();
                const version = '${{ github.event.inputs.version }}';
                const file = '${{ env.JSON_FILE }}';
                const path = resolve(file);
                const latest = JSON.parse(readFileSync(path).toString());
                if(latest[app] !== version){
                  latest[app] = version;
                  writeFileSync(path, JSON.stringify(latest, null, 2));
                  core.exportVariable('LATEST_UPDATE', true);
                }
              }catch(e){
                core.warning(e);
              }
            })();

      - name: checkout
        if: env.LATEST_UPDATE == 'true'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ${{ env.JSON_FILE }}
          git commit -m "chore: update ${{ github.event.inputs.app }} to ${{ github.event.inputs.version }}"
          git push origin HEAD:master