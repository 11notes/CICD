name: json.dependencies

on:
  workflow_dispatch:
    inputs:
      dependency:
        description: 'dependency to set'
        type: string
        required: true

      repository:
        description: 'name of repository'
        type: string
        required: true

env:
  JSON_FILE: ./semver/latest.json

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: write

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: 'master'

      - name: update latest.json
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const { readFileSync, writeFileSync } = require('node:fs');
            const { resolve } = require("node:path");
            (async()=>{
              try{
                const dependency = '${{ github.event.inputs.dependency }}'.toLowerCase();
                const repository = '${{ github.event.inputs.repository }}'.toLowerCase();
                const file = '${{ env.JSON_FILE }}';
                const path = resolve(file);
                const dependencies = JSON.parse(readFileSync(path).toString());
                if(!Array.isArray(dependencies[dependency])){
                  dependencies[dependency] = [];
                }
                if(!dependencies[dependency].includes(repository)){
                  dependencies[dependency].push(repository);
                  writeFileSync(path, JSON.stringify(dependencies, null, 2));
                  core.exportVariable('DEPENDENCY_UPDATE', true);
                }
              }catch(e){
                core.warning(e);
              }
            })();

      - name: checkout
        if: env.DEPENDENCY_UPDATE == 'true'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ${{ env.JSON_FILE }}
          git commit -m "chore: update dependecies with ${{ github.event.inputs.repository }}"
          git push origin HEAD:master